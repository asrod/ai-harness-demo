name: AI Harness Demo

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  harness:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # PR：检出源分支，便于 harness 失败后把 AI 修复 commit 推回同一 PR
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Node deps (if any)
        run: npm install

      - name: Make scripts executable
        run: chmod +x scripts/harness.sh scripts/ai-fix.sh

      - name: Git identity (for AI repair commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run harness (tests + optional AI repair)
        run: bash scripts/harness.sh
        env:
          # Secret：仅密钥。未配置 OPENAI_API_KEY 时 ai-fix 走 mock。
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Repository variables：API 根 URL 与模型（Settings → Secrets and variables → Actions → Variables）
          # 示例 OPENAI_API_BASE: https://api.openai.com/v1
          OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}

      - name: Show recent git log (debug)
        if: always()
        run: git --no-pager log -3 --oneline || true

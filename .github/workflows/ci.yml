name: AI Harness Demo

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "要跑 harness 的分支（PR 卡在必选检查时，可填 PR 头分支如 feat/test-AI）"
        required: false
        default: ""

jobs:
  harness:
    # 在「分支保护 → Required status checks」里选这个名字（完整显示为：AI Harness Demo / PR Karate Harness）
    name: PR Karate Harness
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # PR：检出源分支，便于 harness 失败后把 AI 修复 commit 推回同一 PR
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref != '' && inputs.ref || github.ref_name) || github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          # 可选 Secret：PAT（fine-grained 需 contents:write）。机器人用 GITHUB_TOKEN 推送不会触发新 workflow，
          # 会导致「必选检查」永远等不到最新 commit 上的 PR Karate Harness；配置 PAT 后推送会再次触发 CI。
          token: ${{ secrets.AI_HARNESS_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Node deps (if any)
        run: npm install

      - name: Make scripts executable
        run: chmod +x scripts/harness.sh scripts/ai-fix.sh

      - name: Git identity (for AI repair commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run harness (tests + optional AI repair)
        run: bash scripts/harness.sh
        env:
          # Secret：仅密钥。未配置 OPENAI_API_KEY 时 ai-fix 走 mock。
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Repository variables：API 根 URL 与模型（Settings → Secrets and variables → Actions → Variables）
          # 示例 OPENAI_API_BASE: https://api.openai.com/v1
          OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}

      - name: Show recent git log (debug)
        if: always()
        run: git --no-pager log -3 --oneline || true
